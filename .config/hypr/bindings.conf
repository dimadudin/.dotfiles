bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://gmail.com/"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, G, Github, exec, omarchy-launch-webapp "https://github.com/"
bindd = SUPER SHIFT, T, Telegram, exec, omarchy-launch-webapp "https://web.telegram.org/a/"
bindd = SUPER SHIFT, R, Discord, exec, omarchy-launch-webapp "https://discord.com/channels/@me"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Tiling bindings
# Move focus with SUPER + HJKL
unbind = SUPER, LEFT  # Move window focus left, movefocus, l
unbind = SUPER, RIGHT # Move window focus right, movefocus, r
unbind = SUPER, UP    # Move window focus up, movefocus, u
unbind = SUPER, DOWN  # Move window focus down, movefocus, d
unbind = SUPER, H # NONE -> NONE
unbind = SUPER, L # Toggle workspace layout -> NONE
unbind = SUPER, K # Show key bindings -> SUPER CTRL + K
unbind = SUPER, J # Toggle window split -> NONE
bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, L, Move window focus right, movefocus, r
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, J, Move window focus down, movefocus, d

# Move workspaces to other monitors
unbind = SUPER SHIFT ALT, LEFT  # Move workspace to left monitor, movecurrentworkspacetomonitor, l
unbind = SUPER SHIFT ALT, RIGHT # Move workspace to right monitor, movecurrentworkspacetomonitor, r
unbind = SUPER SHIFT ALT, UP    # Move workspace to up monitor, movecurrentworkspacetomonitor, u
unbind = SUPER SHIFT ALT, DOWN  # Move workspace to down monitor, movecurrentworkspacetomonitor, d
unbind = SUPER SHIFT ALT, H # NONE -> NONE
unbind = SUPER SHIFT ALT, L # NONE -> NONE
unbind = SUPER SHIFT ALT, K # NONE -> NONE
unbind = SUPER SHIFT ALT, J # NONE -> NONE
bindd = SUPER SHIFT ALT, H, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, L, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, K, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, J, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Swap active window with the one next to it with SUPER + SHIFT + HJKL
unbind = SUPER SHIFT, LEFT  # Swap window to the left, swapwindow, l
unbind = SUPER SHIFT, RIGHT # Swap window to the right, swapwindow, r
unbind = SUPER SHIFT, UP    # Swap window up, swapwindow, u
unbind = SUPER SHIFT, DOWN  # Swap window down, swapwindow, d
unbind = SUPER SHIFT, H # NONE -> NONE
unbind = SUPER SHIFT, L # NONE -> NONE
unbind = SUPER SHIFT, K # NONE -> NONE
unbind = SUPER SHIFT, J # NONE -> NONE
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d

# Join groups
unbind = SUPER ALT, LEFT  # Move window to group on left, moveintogroup, l
unbind = SUPER ALT, RIGHT # Move window to group on right, moveintogroup, r
unbind = SUPER ALT, UP, Move window to group on top, moveintogroup, u
unbind = SUPER ALT, DOWN, Move window to group on bottom, moveintogroup, d
unbind = SUPER ALT, H # NONE -> NONE
unbind = SUPER ALT, L # NONE -> NONE
unbind = SUPER ALT, K # NONE -> NONE
unbind = SUPER ALT, J # NONE -> NONE
bindd = SUPER ALT, H, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, L, Move window to group on right, moveintogroup, r
bindd = SUPER ALT, K, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, J, Move window to group on bottom, moveintogroup, d

# Window navigation for grouped windows
unbind = SUPER CTRL, LEFT  # Move grouped window focus left, changegroupactive, b
unbind = SUPER CTRL, RIGHT # Move grouped window focus right, changegroupactive, f
unbind = SUPER CTRL, H # NONE -> NONE
unbind = SUPER CTRL, L # NONE -> NONE
bindd = SUPER CTRL, H, Move grouped window focus left, changegroupactive, b
bindd = SUPER CTRL, L, Move grouped window focus right, changegroupactive, f

# Utility bindings
bindd = SUPER CTRL, K, Show key bindings, exec, omarchy-menu-keybindings

unbind = CTRL ALT, H # Toggle completion -> NONE
unbind = CTRL ALT, J # Toggle temporary completion -> NONE
